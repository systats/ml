name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build and install ml-py (Rust backend)
        run: |
          pip install maturin
          maturin build --release --manifest-path al/py/Cargo.toml --out dist
          pip install dist/ml_py-*.whl
        env:
          # Override .cargo/config.toml target-cpu=native for CI portability
          RUSTFLAGS: ""

      - name: Install mlw with dev dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Verify Rust backend
        run: python -c "from ml._rust import HAS_RUST; assert HAS_RUST, 'Rust backend not available'"

      - name: Lint
        working-directory: python
        run: ruff check ml/

      - name: Test
        working-directory: python
        run: pytest tests/ -x --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ml-py wheel
        run: |
          pip install maturin
          maturin build --release --manifest-path al/py/Cargo.toml --out dist
        env:
          RUSTFLAGS: ""

      - name: Build mlw package
        run: |
          pip install build
          cd python && python -m build

      - name: Verify both packages
        run: |
          pip install dist/ml_py-*.whl
          pip install python/dist/mlw-*.whl
          python -c "import ml; print(f'mlw {ml.__version__}')"
          python -c "from ml._rust import HAS_RUST; assert HAS_RUST, 'Rust not available'"
