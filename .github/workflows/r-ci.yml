name: R CI

on:
  push:
    branches: [main]
    paths: ["r/**", "al/**", ".github/workflows/r-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["r/**", "al/**", ".github/workflows/r-ci.yml"]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r-version: ["4.3", "4.5"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up R ${{ matrix.r-version }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libcurl4-openssl-dev libharfbuzz-dev libfribidi-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r
          extra-packages: any::rcmdcheck, any::pkgload

      - name: Test
        run: Rscript -e 'pkgload::load_all("r"); testthat::test_dir("r/tests/testthat", reporter = "summary")'

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r
          args: 'c("--as-cran", "--no-manual")'
          error-on: '"error"'
